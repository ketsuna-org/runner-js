name: Binaries

on:
  push:
    branches: [main]
    tags:
      - runner-js-v*
    paths:
      - src/**
      - package.json
      - package-lock.json
      - pkg.config.json
  workflow_dispatch:

jobs:
  pkg:
    name: PKG ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            pkg_script: pkg:linux-x64
            artifact: bot-creator-runner-js-linux-x64
            rebuild_native: false
          - runner: ubuntu-24.04-arm
            pkg_script: pkg:linux-arm64
            artifact: bot-creator-runner-js-linux-arm64
            rebuild_native: false
          - runner: windows-latest
            pkg_script: pkg:win-x64
            artifact: bot-creator-runner-js-win.exe
            rebuild_native: true
          - runner: macos-latest
            pkg_script: pkg:macos-arm64
            artifact: bot-creator-runner-js-macos-arm64
            rebuild_native: true
          - runner: macos-13
            pkg_script: pkg:macos-x64
            artifact: bot-creator-runner-js-macos-x64
            rebuild_native: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # windows-latest ships VS 2026 (v18); Node 22's bundled node-gyp 11.x cannot use it.
      # npm 11.6.3+ bundles node-gyp 12.1.0+ with VS 2026 support.
      - name: Upgrade npm (Windows)
        if: runner.os == 'Windows'
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        if: matrix.rebuild_native
        run: npm rebuild isolated-vm canvas @discordjs/opus bufferutil zlib-sync sodium-native @libsql/client

      - name: Build and test
        run: |
          npm run build
          npm test

      - name: Build PKG binary
        run: npm run ${{ matrix.pkg_script }}

      - name: Upload PKG artifact
        if: startsWith(github.ref, 'refs/tags/runner-js-v')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/${{ matrix.artifact }}

  release:
    name: Attach PKG binaries to release
    needs: pkg
    if: startsWith(github.ref, 'refs/tags/runner-js-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten release assets
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name 'bot-creator-runner-js-linux-x64' -o \
            -name 'bot-creator-runner-js-linux-arm64' -o \
            -name 'bot-creator-runner-js-win.exe' -o \
            -name 'bot-creator-runner-js-macos-arm64' -o \
            -name 'bot-creator-runner-js-macos-x64' \
            \) -exec cp {} release/ \;
          ls -la release/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
